server:
  port: 8084

spring:
  application:
    name: GATEWAY

  cloud:
    gateway:
      routes:
        - id: USER-SERVICE
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**,/api/home/**

        - id: RATING-SERVICE
          uri: http://localhost:8083
          predicates:
            - Path=/api/ratings/**
        
        - id: HOTEL-SERVICE
          uri: http://localhost:8082
          predicates:
            - Path=/api/hotels/**

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    