server:
  port: 8082

spring:
  application:
    name: HOTEL-SERVICE

  config:
    import: "optional:configserver:http://localhost:8085"

  profiles:
    active:
      - default

  datasource:
    url: jdbc:mysql://localhost:3306/micro_hotel
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true